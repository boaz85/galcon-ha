substitutions:
  device_name: galcon-irrigation
  friendly_name: Galcon Irrigation

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev   # change to your board: m5stack-atom, lolin32, wemos_d1_mini32, etc.
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ---------------------------------------------------------------------------
# BLE
# ---------------------------------------------------------------------------

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 100ms
    window: 99ms
  # ── MAC DISCOVERY ──────────────────────────────────────────────────────────
  # On first flash, watch the serial log for a line like:
  #   [galcon] Found Galcon MAC: AA:BB:CC:DD:EE:FF  name: Galcon
  # Copy that MAC into secrets.yaml as galcon_mac, then remove this block.
  on_ble_advertise:
    then:
      - lambda: |-
          for (auto &uuid : x.get_service_uuids()) {
            if (uuid == espbt::ESPBTUUID::from_raw("e8680100-9c4b-11e4-b5f7-0002a5d5c51b")) {
              ESP_LOGI("galcon", "Found Galcon  MAC: %s  name: %s",
                       x.address_str().c_str(), x.get_name().c_str());
            }
          }

# ---------------------------------------------------------------------------
# State globals (updated by the STATUS notify handler)
# ---------------------------------------------------------------------------

globals:
  - id: galcon_is_open
    type: bool
    initial_value: "false"

# ---------------------------------------------------------------------------
# BLE client
# ---------------------------------------------------------------------------

ble_client:
  - mac_address: !secret galcon_mac
    id: galcon
    auto_connect: true

    on_connect:
      then:
        - logger.log: "Galcon connected — authenticating"
        # AUTH must be written once per connection before any read/write
        - ble_client.ble_write:
            id: galcon
            service_uuid: "e8680200-9c4b-11e4-b5f7-0002a5d5c51b"
            characteristic_uuid: "e8680201-9c4b-11e4-b5f7-0002a5d5c51b"
            value: [0x01, 0x02]
        - logger.log: "Galcon authenticated"

    on_disconnect:
      then:
        - logger.log: "Galcon disconnected"
        # Mark valve unknown while disconnected
        - lambda: "id(galcon_is_open) = false;"
        - lambda: "id(galcon_valve).publish_state(esphome::valve::VALVE_CLOSED);"
        - sensor.template.publish:
            id: galcon_remaining
            state: 0

# ---------------------------------------------------------------------------
# STATUS characteristic — source of truth for all state
#
# Payload (7 bytes):
#   byte[0] bit0 : valve open
#   byte[1]      : 1 = manual mode, 0 = auto/scheduled
#   byte[2..4]   : remaining H, M, S (normalise: convert to total seconds first)
#   byte[5..6]   : 0x47 0x00 — constant, model identifier
# ---------------------------------------------------------------------------

sensor:
  - platform: ble_client
    ble_client_id: galcon
    id: galcon_status
    internal: true                  # raw handler; exposes data via other entities
    service_uuid: "e8680100-9c4b-11e4-b5f7-0002a5d5c51b"
    characteristic_uuid: "e8680102-9c4b-11e4-b5f7-0002a5d5c51b"
    notify: true
    update_interval: 30s            # poll every 30s + receive push on state change
    lambda: |-
      if (x.size() < 5) return NAN;

      bool is_open = x[0] & 0x01;
      int total_secs = x[2] * 3600 + x[3] * 60 + x[4];

      // Update valve entity
      id(galcon_is_open) = is_open;
      id(galcon_valve).publish_state(
        is_open ? esphome::valve::VALVE_OPEN : esphome::valve::VALVE_CLOSED
      );

      // Update remaining-time sensor (minutes, 1 decimal)
      id(galcon_remaining).publish_state(total_secs / 60.0f);

      return NAN;  // internal sensor, value unused

  # Remaining irrigation time (published from STATUS lambda above)
  - platform: template
    id: galcon_remaining
    name: "${friendly_name} Remaining"
    unit_of_measurement: min
    accuracy_decimals: 1
    device_class: duration
    state_class: measurement
    icon: mdi:timer-outline

# ---------------------------------------------------------------------------
# Valve entity  (open / close control)
# ---------------------------------------------------------------------------

valve:
  - platform: template
    name: "${friendly_name}"
    id: galcon_valve
    device_class: water
    lambda: |-
      if (id(galcon_is_open)) return VALVE_OPEN;
      return VALVE_CLOSED;

    open_action:
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680200-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680201-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x01, 0x02]
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680100-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680103-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00]

    close_action:
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680200-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680201-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x01, 0x02]
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680100-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680103-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]

# ---------------------------------------------------------------------------
# Connection status
# ---------------------------------------------------------------------------

binary_sensor:
  - platform: ble_client
    ble_client_id: galcon
    name: "${friendly_name} Connected"
    id: galcon_connected
    entity_category: diagnostic
