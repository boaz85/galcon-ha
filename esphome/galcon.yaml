substitutions:
  device_name: galcon-irrigation
  friendly_name: Galcon Irrigation

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: m5stack-atoms3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ---------------------------------------------------------------------------
# Status LED  (single WS2812 on GPIO35)
#   red   = searching for Galcon
#   green = connected to Galcon
# ---------------------------------------------------------------------------

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    internal: true
    pin: GPIO35
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    restore_mode: ALWAYS_OFF

# ---------------------------------------------------------------------------
# BLE
# ---------------------------------------------------------------------------

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 100ms
    window: 99ms

# ---------------------------------------------------------------------------
# State globals (updated by the STATUS notify handler)
# ---------------------------------------------------------------------------

globals:
  - id: galcon_is_open
    type: bool
    initial_value: "false"

# ---------------------------------------------------------------------------
# BLE client
# ---------------------------------------------------------------------------

ble_client:
  - mac_address: !secret galcon_mac
    id: galcon
    auto_connect: true

    on_connect:
      then:
        - logger.log: "Galcon connected — waiting for service discovery"
        - delay: 5s
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
        # AUTH must be written once per connection before any read/write
        - ble_client.ble_write:
            id: galcon
            service_uuid: "e8680200-9c4b-11e4-b5f7-0002a5d5c51b"
            characteristic_uuid: "e8680201-9c4b-11e4-b5f7-0002a5d5c51b"
            value: [0x01, 0x02]
        - logger.log: "Galcon authenticated"

    on_disconnect:
      then:
        - logger.log: "Galcon disconnected"
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%

# ---------------------------------------------------------------------------
# STATUS characteristic — source of truth for all state
#
# Payload (7 bytes):
#   byte[0] bit0 : valve open
#   byte[1]      : 1 = manual mode, 0 = auto/scheduled
#   byte[2..4]   : remaining H, M, S
#   byte[5..6]   : 0x47 0x00 — constant, model identifier
# ---------------------------------------------------------------------------

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: galcon
    id: galcon_status
    internal: true
    service_uuid: "e8680100-9c4b-11e4-b5f7-0002a5d5c51b"
    characteristic_uuid: "e8680102-9c4b-11e4-b5f7-0002a5d5c51b"
    notify: true
    update_interval: 30s
    lambda: |-
      if (x.size() < 5) return NAN;

      bool is_open = x[0] & 0x01;
      int total_secs = x[2] * 3600 + x[3] * 60 + x[4];

      id(galcon_is_open) = is_open;
      id(galcon_valve).publish_state(
        is_open ? esphome::valve::VALVE_OPEN : esphome::valve::VALVE_CLOSED
      );
      id(galcon_remaining).publish_state(total_secs / 60.0f);

      return NAN;

  - platform: template
    id: galcon_remaining
    name: "${friendly_name} Remaining"
    unit_of_measurement: min
    accuracy_decimals: 1
    device_class: duration
    state_class: measurement
    icon: mdi:timer-outline

# ---------------------------------------------------------------------------
# Valve entity  (open / close control)
# ---------------------------------------------------------------------------

valve:
  - platform: template
    name: "${friendly_name}"
    id: galcon_valve
    device_class: water
    lambda: |-
      if (id(galcon_is_open)) return VALVE_OPEN;
      return VALVE_CLOSED;

    open_action:
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680200-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680201-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x01, 0x02]
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680100-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680103-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00]

    close_action:
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680200-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680201-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x01, 0x02]
      - ble_client.ble_write:
          id: galcon
          service_uuid: "e8680100-9c4b-11e4-b5f7-0002a5d5c51b"
          characteristic_uuid: "e8680103-9c4b-11e4-b5f7-0002a5d5c51b"
          value: [0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
